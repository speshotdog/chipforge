<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChipForge｜8BIT 晶片音樂工坊</title>
<meta name="description" content="ChipForge — 瀏覽器裡的 8-bit 晶片音樂鍛造工坊：自動作曲、piano-roll 編輯、WAV/MIDI 匯出">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='2' y='2' width='12' height='12' fill='%23ffc848'/><rect x='4' y='4' width='8' height='8' fill='%230b0714'/><rect x='6' y='6' width='4' height='4' fill='%23ff5f3c'/></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="crt"></div>

<header class="topbar px-panel">
  <div class="logo">
    <div class="logo-main">CHIP<em>FORGE</em></div>
    <div class="logo-sub">８ＢＩＴ 晶片音樂工坊</div>
  </div>

  <div class="transport">
    <button id="btnPlay" class="px-btn btn-play">▶ 播放</button>
    <div class="t-group">
      <span class="t-label">速度</span>
      <input type="range" id="bpm" min="60" max="220" value="132" class="px-range">
      <span class="t-val" id="bpmVal">132</span>
    </div>
    <div class="t-group">
      <span class="t-label">曲長</span>
      <div class="bar-picker" id="barPicker"></div>
    </div>
    <div class="t-group">
      <button id="btnUndo" class="px-btn sm" title="Ctrl+Z">◀復原</button>
      <button id="btnRedo" class="px-btn sm" title="Ctrl+Y">重做▶</button>
      <button id="btnClear" class="px-btn sm danger">清空</button>
    </div>
    <div class="seed-badge" id="seedBadge" title="這首曲子的鍛造種子">SEED —</div>
  </div>

  <canvas id="mascot" width="104" height="80" title="熱狗仔"></canvas>
</header>

<div class="workspace">
  <aside class="toolbar px-panel">
    <div class="tb-title">工具</div>
    <div class="tools" id="tools">
      <button class="tool-btn t-lead active" data-tool="lead"><i></i>主旋律</button>
      <button class="tool-btn t-harm" data-tool="harm"><i></i>和聲</button>
      <button class="tool-btn t-bass" data-tool="bass"><i></i>貝斯</button>
      <button class="tool-btn t-noise" data-tool="noise"><i></i>噪音</button>
      <button class="tool-btn t-sus" data-tool="sus"><i></i>長音</button>
      <button class="tool-btn t-erase" data-tool="erase"><i></i>擦除</button>
    </div>
    <div class="tb-title">鼓組</div>
    <div class="drum-legend">
      <span class="dl dl-kick">■ 大鼓</span>
      <span class="dl dl-snare">■ 小鼓</span>
      <span class="dl dl-hat">■ 踏鈸</span>
    </div>
    <button id="btnMixer" class="px-btn wide">🎛 混音台</button>
    <div class="tb-hints">
      <p>點擊放置／再點擦除</p>
      <p>右鍵＝橡皮擦</p>
      <p>Shift＋點＝重音</p>
      <p>「長音」向右拖＝延長<br>放開在別列＝滑音</p>
      <p>空白鍵＝播放／停止</p>
    </div>
  </aside>

  <main class="rollwrap px-panel">
    <div class="rollscroll" id="rollScroll">
      <canvas id="roll"></canvas>
      <div id="playhead"></div>
    </div>
  </main>
</div>

<section class="genpanel px-panel">
  <div class="gp-left">
    <div class="gp-title">⚒ 自動鍛造</div>
    <div class="theme-cats" id="themeCats"></div>
    <div class="themes" id="themes"></div>
  </div>
  <div class="gp-mid">
    <div class="gp-title">屬性</div>
    <div class="sliders" id="sliders"></div>
    <label class="px-toggle"><input type="checkbox" id="tglSeq" checked><span></span>模進（動機移調重現）</label>
  </div>
  <div class="gp-right">
    <div class="gp-title">總監</div>
    <div class="cyc-row"><span>作曲模式</span><button class="px-btn sm cyc" id="cycDirector">均衡</button></div>
    <div class="cyc-row"><span>選定強度</span><button class="px-btn sm cyc" id="cycPower">弱</button></div>
    <div class="cyc-row"><span>曲式</span><button class="px-btn sm cyc" id="cycForm">自動</button></div>
    <div class="cyc-row"><span title="Undertale 式雷特動機：記住的旋律動機會出現在之後每首新曲的主歌與副歌開頭">雷特動機</span><button class="px-btn sm cyc" id="btnMotif">記住動機</button></div>
    <button id="btnForge" class="px-btn forge">⚒ 鍛造樂曲</button>
    <div class="forge-row">
      <button id="btnReforge" class="px-btn sm">再鍛一批</button>
      <button id="btnVary" class="px-btn sm">變奏</button>
    </div>
    <div id="forgeStatus" class="forge-status"></div>
    <div id="candidates" class="candidates"></div>
    <div class="gp-title" style="margin-top:6px">地區 BGM 日夜配對</div>
    <button id="btnNight" class="px-btn sm night">☀→🌙 生成夜間變奏</button>
    <div id="pairChips" class="candidates"></div>
  </div>
</section>

<footer class="exportbar px-panel">
  <span class="ex-title">出爐</span>
  <button id="btnWav" class="px-btn sm gold">♪ WAV 音檔</button>
  <button id="btnMidi" class="px-btn sm gold">♬ MIDI</button>
  <button id="btnJson" class="px-btn sm">存檔 JSON</button>
  <button id="btnLoad" class="px-btn sm">讀檔 JSON</button>
  <button id="btnShare" class="px-btn sm cyan">🔗 分享連結</button>
  <input type="file" id="fileInput" accept=".json" hidden>
  <span class="ex-hint" id="exHint">曲子會自動保存在瀏覽器裡</span>
</footer>

<div id="mixerModal" class="modal hidden">
  <div class="modal-box px-panel">
    <div class="modal-head">
      <span>🎛 混音台</span>
      <button id="btnMixClose" class="px-btn sm">✕ 關閉</button>
    </div>
    <div id="mixerBody" class="mixer-body"></div>
    <div class="modal-foot">
      <button id="btnMixReset" class="px-btn sm danger">恢復預設</button>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
